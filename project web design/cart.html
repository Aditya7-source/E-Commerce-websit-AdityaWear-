<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - AdityaWear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar bg-white shadow-sm px-3 py-2">
  <div class="container-fluid d-flex align-items-center justify-content-between">
    <!-- Text Logo -->
    <h4 class="m-0 fw-bold">
      <span style="color: orange;">ADITYA</span>
      <span style="color: #0056d2;">WEAR</span>
    </h4>

    <!-- Login & Cart -->
    <div class="d-flex align-items-center gap-4">
      <a href="login.html" class="text-dark text-decoration-none d-flex align-items-center">
        <i class="bi bi-person me-1"></i> Login
      </a>
      <a href="cart.html" class="text-dark text-decoration-none d-flex align-items-center">
        <i class="bi bi-cart me-1"></i> Cart
      </a>
    </div>
  </div>
</nav>

<!-- Cart Section -->
<div class="container my-5">
  <h4 class="mb-4 fw-bold">🛒 Your Cart</h4>
  <div id="cart-container"></div>

  <div id="cart-summary" class="mt-4 d-none">
    <h5>Total: ₹<span id="cart-total">0</span></h5>
    <button onclick="handleCheckout()" class="btn btn-primary mt-3">Proceed to Checkout</button>
  </div>
</div>

<!-- Script -->
<script>
  const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
  const container = document.getElementById("cart-container");
  const totalBox = document.getElementById("cart-summary");
  const totalSpan = document.getElementById("cart-total");

  function displayCart() {
    container.innerHTML = "";

    if (cartItems.length === 0) {
      container.innerHTML = "<p class='text-muted'>Your cart is empty.</p>";
      totalBox.classList.add("d-none");
      return;
    }

    let total = 0;

    cartItems.forEach((item, index) => {
      total += Number(item.price);

      const card = `
        <div class="d-flex align-items-center border-bottom pb-3 mb-3">
          <img src="${item.image}" alt="${item.title}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px;">
          <div class="flex-grow-1">
            <h6 class="mb-1">${item.title}</h6>
            <p class="mb-0 text-success">₹${item.price}</p>
          </div>
          <button class="btn btn-outline-danger btn-sm" onclick="removeItem(${index})">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      `;
      container.innerHTML += card;
    });

    totalSpan.textContent = total;
    totalBox.classList.remove("d-none");
  }

  function removeItem(index) {
    cartItems.splice(index, 1);
    localStorage.setItem("cartItems", JSON.stringify(cartItems));
    displayCart();
  }

  function handleCheckout() {
    const user = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!user) {
      localStorage.setItem("cartCheckoutIntent", "true");
      alert("Please log in to continue to checkout.");
      window.location.href = "login.html";
      return;
    }

    window.location.href = "checkout.html";
  }

  displayCart();
</script>

</body>
</html>

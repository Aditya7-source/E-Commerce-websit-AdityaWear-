<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdityaWear - Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
    }
    .form-input:focus {
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.25);
      border-color: #4f46e5;
    }
    .quantity-btn:hover {
      background-color: #e5e7eb;
    }
  </style>
  <script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) {
      alert("🚫 Please log in to continue with checkout.");
      localStorage.setItem("cartCheckoutIntent", true); // so we redirect correctly after login
      window.location.href = "login.html";
    }
  </script>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="bg-white shadow-sm py-4">
  <div class="container mx-auto px-4 flex items-center justify-between">
    <h4 class="m-0 fw-bold">
      <span style="color: orange;">ADITYA</span>
      <span style="color: #0056d2;">WEAR</span>
    </h4>
    <nav>
      <ul class="flex space-x-6">
        <li><a href="index.html" class="text-gray-600 hover:text-indigo-600">Home</a></li>
        <li><a href="#" class="text-gray-600 hover:text-indigo-600">Help</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-gray-800 mb-8">Checkout</h1>

  <div class="flex flex-col lg:flex-row gap-8">

    <!-- Left Section -->
    <div class="lg:w-2/3">
      <!-- Shipping Form -->
      <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Shipping Information</h2>
        <form id="shipping-form" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" placeholder="First Name" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
            <input type="text" placeholder="Last Name" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
          </div>
          <input type="text" placeholder="Street Address" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" placeholder="City" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
            <select class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required>
              <option value="">Select State</option>
              <option value="OD">Odisha</option>
              <option value="AP">Andhra Pradesh</option>
              <option value="B">Bihar</option>
              <option value="GT">Gujarat</option>
              <option value="PB">Punjab</option>
            </select>
            <input type="text" placeholder="ZIP Code" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
          </div>
          <input type="email" placeholder="Email Address" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
          <input type="tel" placeholder="Phone Number" class="form-input w-full px-4 py-2 border border-gray-300 rounded-md" required/>
        </form>
      </div>

      <!-- Payment Method -->
      <div class="bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Payment Method</h2>
        <div class="space-y-4">
          <div class="flex items-center">
            <input type="radio" name="payment" value="card" class="h-4 w-4 text-indigo-600" required />
            <label class="ml-3 text-sm font-medium text-gray-700">Credit/Debit Card</label>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" placeholder="Card Number" class="form-input px-4 py-2 border border-gray-300 rounded-md"/>
            <input type="text" placeholder="Name on Card" class="form-input px-4 py-2 border border-gray-300 rounded-md"/>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <input type="text" placeholder="MM/YY" class="form-input px-4 py-2 border border-gray-300 rounded-md"/>
            <input type="text" placeholder="CVV" class="form-input px-4 py-2 border border-gray-300 rounded-md"/>
          </div>

          <div class="flex items-center mt-4">
            <input type="radio" name="payment" value="upi" class="h-4 w-4 text-indigo-600" required />
            <label class="ml-3 text-sm font-medium text-gray-700">UPI / Wallets</label>
          </div>
          <div class="flex gap-4 mt-2 ml-7">
            <img src="https://img.icons8.com/?size=96&id=w0MU3YDSYG7T&format=png" alt="GPay" class="h-8 w-auto">
            <img src="https://img.icons8.com/?size=96&id=OYtBxIlJwMGA&format=png" alt="PhonePe" class="h-8 w-auto">
            <img src="https://img.icons8.com/?size=96&id=68067&format=png" alt="Paytm" class="h-8 w-auto">
          </div>

          <div class="flex items-center mt-4">
            <input type="radio" name="payment" value="cod" class="h-4 w-4 text-indigo-600" required />
            <label class="ml-3 text-sm font-medium text-gray-700">Cash on Delivery</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="lg:w-1/3">
      <div class="bg-white rounded-lg shadow-sm p-6 sticky top-4">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Your Order</h2>
        <div id="cart-items" class="space-y-6 mb-6"></div>

        <div class="space-y-3 mb-6">
          <div class="flex justify-between">
            <span class="text-sm text-gray-600">Subtotal</span>
            <span class="text-sm font-medium text-gray-900" id="subtotal">₹0</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm text-gray-600">Shipping</span>
            <span class="text-sm font-medium text-gray-900">₹9</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm text-gray-600">Tax</span>
            <span class="text-sm font-medium text-gray-900">₹11</span>
          </div>
          <div class="flex justify-between pt-4 border-t border-gray-200">
            <span class="text-base font-medium text-gray-800">Total</span>
            <span class="text-base font-medium text-gray-800" id="total">₹0</span>
          </div>
        </div>

        <button id="placeOrderBtn" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition">
          Place Order
        </button>
        <p class="mt-4 text-xs text-gray-500 text-center">
          By placing your order, you agree to our 
          <a href="#" class="text-indigo-600 hover:underline">Terms of Service</a> and 
          <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>.
        </p>
      </div>
    </div>
  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const cartItemsDiv = document.getElementById("cart-items");
  const placeOrderBtn = document.getElementById("placeOrderBtn");
  let cart = JSON.parse(localStorage.getItem("cartItems")) || [];
  let subtotal = 0;

  if (!Array.isArray(cart) || cart.length === 0) {
    cartItemsDiv.innerHTML = '<p class="text-gray-500 text-sm">Your cart is empty.</p>';
  } else {
    cart.forEach((item, index) => {
      item.quantity = item.quantity || 1;
      item.price = item.price || 0;
      subtotal += item.price * item.quantity;

      const div = document.createElement("div");
      div.className = "flex items-start pb-4 border-b border-gray-200";
      div.innerHTML = `
        <div class="flex-shrink-0 mr-4">
          <img src="${item.image}" alt="${item.title}" class="h-24 w-20 rounded object-cover">
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-medium text-gray-800">${item.title}</h3>
          <p class="text-sm text-gray-500">Qty: ${item.quantity}</p>
          <div class="mt-2 flex justify-between">
            <div class="flex items-center border border-gray-300 rounded-md overflow-hidden">
              <button class="quantity-btn px-3 py-1" data-index="${index}" data-type="minus">-</button>
              <span class="px-3 py-1">${item.quantity}</span>
              <button class="quantity-btn px-3 py-1" data-index="${index}" data-type="plus">+</button>
            </div>
            <span class="text-sm font-medium text-gray-900">₹${item.price * item.quantity}</span>
          </div>
        </div>
      `;
      cartItemsDiv.appendChild(div);
    });
  }

  document.getElementById("subtotal").innerText = `₹${subtotal}`;
  document.getElementById("total").innerText = `₹${subtotal + 9 + 11}`;

  placeOrderBtn.addEventListener("click", () => {
    const form = document.getElementById("shipping-form");
    const requiredFields = form.querySelectorAll("input[required], select[required]");
    const paymentSelected = document.querySelector('input[name="payment"]:checked');

    let allFilled = true;
    requiredFields.forEach(field => {
      if (!field.value.trim()) {
        allFilled = false;
        field.classList.add("border-red-500");
      } else {
        field.classList.remove("border-red-500");
      }
    });

    if (!paymentSelected) {
      alert("Please select a payment method.");
      return;
    }

    if (!allFilled) {
      alert("Please fill in all required shipping fields.");
      return;
    }

    // Save order
    const userDetails = {
      firstName: form[0].value,
      lastName: form[1].value,
      address: form[2].value,
      city: form[3].value,
      state: form[4].value,
      zip: form[5].value,
      email: form[6].value,
      phone: form[7].value
    };
    localStorage.setItem("userDetails", JSON.stringify(userDetails));
    localStorage.setItem("orderStatus", "Order Placed");
    localStorage.setItem("orderDate", new Date().toISOString());

    // Redirect
    window.location.href = "thankyou.html";
  });
});

window.addEventListener("click", (e) => {
  if (e.target.classList.contains("quantity-btn")) {
    const index = e.target.dataset.index;
    const type = e.target.dataset.type;
    let cart = JSON.parse(localStorage.getItem("cartItems")) || [];

    if (cart[index]) {
      if (type === "plus" && cart[index].quantity < 10) {
        cart[index].quantity++;
      } else if (type === "minus" && cart[index].quantity > 1) {
        cart[index].quantity--;
      }
      localStorage.setItem("cartItems", JSON.stringify(cart));
      location.reload();
    }
  }
});
</script>

</body>
</html>
